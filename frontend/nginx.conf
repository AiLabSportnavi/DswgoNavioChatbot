# Navio frontend — static SPA server (Cloud Run / any container).
# This serves ONLY the built static site. The browser calls the backend directly
# at the absolute VITE_NAVIO_API URL baked in at build time (CORS-allowed by the
# backend's ALLOWED_ORIGINS) — the same wiring used on Vercel — so there is no
# /api reverse proxy here anymore.
server {
    # Cloud Run sends traffic to the port we declare with --port (8080).
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip the static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback: any non-file route serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
