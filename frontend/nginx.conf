# Navio frontend — static SPA server + API reverse proxy (Cloud Run).
server {
    # Cloud Run sends traffic to the port we declare with --port (8080).
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip the static assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Reverse-proxy API calls to the backend Cloud Run service. No trailing path
    # on proxy_pass => the original URI (/api/chat) is forwarded unchanged.
    # proxy_ssl_server_name + Host header are required so Cloud Run routes to the
    # right service over TLS (it routes by Host/SNI).
    location /api/ {
        proxy_pass https://navio-309602963301.europe-west3.run.app;
        proxy_ssl_server_name on;
        proxy_set_header Host navio-309602963301.europe-west3.run.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SPA fallback: any non-file route serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
